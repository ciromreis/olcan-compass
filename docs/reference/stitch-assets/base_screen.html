<script data-purpose="canvas-liquid-logic">
    // Paper.js logic for liquid blob
    paper.install(window);
    window.onload = function() {
      paper.setup('liquid-canvas');
      
      const width = view.size.width;
      const height = view.size.height;
      const center = view.center;
      
      const points = 8;
      const radius = Math.min(width, height) * 0.4;
      const path = new Path({
        fillColor: {
          gradient: {
            stops: [['#444', 0], ['#111', 0.5], ['#000', 1]],
            radial: true
          },
          origin: center,
          destination: center.add(new Point(radius, radius))
        },
        closed: true,
        opacity: 0.6
      });

      for (let i = 0; i < points; i++) {
        const delta = new Point({
          length: radius,
          angle: (360 / points) * i
        });
        path.add(center.add(delta));
      }
      path.smooth();

      let mousePos = view.center;

      view.onMouseMove = (event) => {
        mousePos = event.point;
      };

      view.onFrame = (event) => {
        for (let i = 0; i < points; i++) {
          const sinus = Math.sin(event.time * 2 + i);
          const segment = path.segments[i];
          const factor = 20;
          
          // Organic movement
          segment.point.x += sinus * 0.5;
          segment.point.y += Math.cos(event.time * 1.5 + i) * 0.5;

          // React to mouse
          const dist = segment.point.getDistance(mousePos);
          if (dist < 200) {
            const diff = segment.point.subtract(mousePos).normalize().multiply((200 - dist) * 0.1);
            segment.point = segment.point.add(diff);
          }
        }
        path.smooth();
      };
    };
  </script>
<script data-purpose="gsap-animations">
    document.addEventListener('DOMContentLoaded', () => {
      const tl = gsap.timeline({ defaults: { ease: "power4.out", duration: 1.5 } });

      // Reveal Animations
      tl.to("#hero-title", {
        clipPath: "polygon(0 0, 100% 0, 100% 100%, 0 100%)",
        y: 0,
        stagger: 0.2
      })
      .to("#hero-subtext", {
        clipPath: "polygon(0 0, 100% 0, 100% 100%, 0 100%)",
        y: 0,
      }, "-=1.2")
      .to("#hero-cta", {
        opacity: 1,
        y: 0,
      }, "-=1");

      // Parallax effect
      window.addEventListener('mousemove', (e) => {
        const { clientX, clientY } = e;
        const xPos = (clientX / window.innerWidth) - 0.5;
        const yPos = (clientY / window.innerHeight) - 0.5;

        gsap.to(".parallax-el", {
          x: (i, target) => xPos * 100 * target.dataset.speed * 10,
          y: (i, target) => yPos * 100 * target.dataset.speed * 10,
          rotate: (i, target) => xPos * 20,
          duration: 1,
          ease: "power2.out"
        });
      });
    });
  </script>
