services:
  - type: web
    name: olcan-compass-api
    env: docker
    rootDir: apps/api
    plan: free
    autoDeploy: true
    # Render uses this path to determine if the service is healthy/ready.
    # Must match the route registered in health.py (mounted at API_PREFIX).
    healthCheckPath: /api/health
    envVars:
      - key: ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      # Comma-separated list of allowed CORS origins.
      # Add compass.olcan.com.br here once DNS is configured.
      - key: CORS_ALLOW_ORIGINS
        value: https://olcan-compass-web.netlify.app
