services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: compass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  celery_worker:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app
    depends_on:
      - db
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info --queues=economics

  celery_beat:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app
    depends_on:
      - db
      - redis
    command: celery -A app.core.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
