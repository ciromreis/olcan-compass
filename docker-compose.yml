version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: olcan_medusa_postgres
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa_password
      POSTGRES_DB: olcan_marketplace
    ports:
      - "5432:5432"
    volumes:
      - medusa_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: olcan_medusa_redis
    ports:
      - "6379:6379"

volumes:
  medusa_postgres_data:
