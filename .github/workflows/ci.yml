name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type-check app-compass-v2.5
        run: cd apps/app-compass-v2.5 && npx tsc --noEmit
        continue-on-error: true

      - name: Build app-compass-v2.5 (Next.js)
        run: cd apps/app-compass-v2.5 && npm run build

      - name: Lint app-compass-v2.5
        run: cd apps/app-compass-v2.5 && npm run lint || echo "Lint warnings found, continuing..."

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api-core-v2.5/requirements.txt
      - name: Install backend dependencies
        run: |
          cd apps/api-core-v2.5
          pip install -r requirements.txt
      - name: Lint with ruff
        run: |
          cd apps/api-core-v2.5
          pip install ruff
          ruff check app/ --output-format=github
      - name: Syntax check (py_compile)
        # Catches import errors and syntax mistakes without needing a live DB
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          JWT_SECRET_KEY: ci-secret-key-for-syntax-check-only
        run: |
          cd apps/api-core-v2.5
          python -c "
          import ast, sys, os, pathlib
          errors = []
          for path in pathlib.Path('app').rglob('*.py'):
              try:
                  ast.parse(path.read_text())
              except SyntaxError as e:
                  errors.append(f'{path}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'All Python files parsed OK ({len(list(pathlib.Path(\"app\").rglob(\"*.py\")))} files)')
          "
