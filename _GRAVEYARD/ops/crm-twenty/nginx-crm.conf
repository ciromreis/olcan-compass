# Nginx server block snippet for Twenty CRM
#
# Add this to your reverse proxy (or include it from nginx.conf).
# Assumes Twenty listens on http://127.0.0.1:3100 (docker port mapping).

server {
  listen 80;
  server_name crm.olcan.com.br;

  # Redirect to HTTPS if you terminate TLS here
  # return 301 https://$host$request_uri;

  location / {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

