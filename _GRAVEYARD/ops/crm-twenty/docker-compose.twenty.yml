name: olcan-twenty

services:
  twenty:
    image: twentycrm/twenty:${TAG:-latest}
    container_name: olcan_twenty_server
    restart: unless-stopped
    ports:
      # Keep it off 3000 so it doesn't clash with existing stacks
      - "3100:3000"
    volumes:
      - twenty_server_local_data:/app/packages/twenty-server/.local-storage
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-twenty}:${PG_DATABASE_PASSWORD:-twenty_password}@${PG_DATABASE_HOST:-db}:${PG_DATABASE_PORT:-5432}/${PG_DATABASE_NAME:-twenty}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SERVER_URL: ${SERVER_URL}
      APP_SECRET: ${APP_SECRET}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      # S3 options available in upstream compose if needed later
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  db:
    image: postgres:16
    container_name: olcan_twenty_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE_NAME:-twenty}
      POSTGRES_USER: ${PG_DATABASE_USER:-twenty}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD:-twenty_password}
    volumes:
      - twenty_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USER:-twenty} -h localhost -d ${PG_DATABASE_NAME:-twenty}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: olcan_twenty_redis
    restart: unless-stopped
    volumes:
      - twenty_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  twenty_server_local_data:
  twenty_db_data:
  twenty_redis_data:

